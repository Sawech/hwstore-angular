<div class="fixed inset-0 -z-10 bg-surface"></div>

<!-- Decorative icons -->
<div class="fixed bottom-0 right-0 p-12 opacity-[0.04] pointer-events-none hidden lg:block">
  <span class="material-symbols-outlined" style="font-size: 12rem">terminal</span>
</div>
<div class="fixed top-0 left-0 p-12 opacity-[0.04] pointer-events-none hidden lg:block">
  <span class="material-symbols-outlined" style="font-size: 10rem">memory</span>
</div>

<!-- Login container -->
<main class="min-h-screen flex items-center justify-center px-6 py-12 selection:bg-primary/20">
  <div class="w-full max-w-md">
    <!-- Branding -->
    <div class="mb-12 text-center md:text-left md:pl-4">
      <div class="inline-flex items-center justify-center md:justify-start mb-6">
        <div
          class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center"
        >
          <span
            class="material-symbols-outlined text-white text-2xl"
            style="font-variation-settings: 'FILL' 1"
            >memory</span
          >
        </div>
        <span class="ml-3 text-2xl font-extrabold tracking-tighter text-primary">HWstore</span>
      </div>
      <h1 class="text-[1.75rem] font-bold tracking-tight text-on-surface mb-1">
        Connexion Administrateur
      </h1>
      <p class="text-sm text-secondary">Accès sécurisé au panneau de gestion</p>
    </div>

    <!-- Auth card -->
    <div
      class="bg-surface-container-lowest rounded-xl p-8 md:p-10 relative overflow-hidden editorial-shadow"
    >
      <!-- Magenta top accent -->
      <div
        class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container opacity-80"
      ></div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email -->
        <div class="space-y-2">
          <label
            class="block text-[0.75rem] font-bold uppercase tracking-wider text-on-surface-variant"
            for="email"
            >Adresse e-mail</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-secondary"
            >
              <span class="material-symbols-outlined text-lg">mail</span>
            </div>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="admin@hwstore.fr"
              class="ghost-border block w-full pl-11 pr-4 py-3.5 bg-surface text-on-surface rounded-lg focus:ring-0 focus:outline-none transition-all placeholder:text-outline-variant/60"
              [class.border-error]="form.get('email')?.invalid && form.get('email')?.touched"
            />
          </div>
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="text-xs text-error">Adresse e-mail invalide</p>
          }
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label
            class="block text-[0.75rem] font-bold uppercase tracking-wider text-on-surface-variant"
            for="password"
            >Mot de passe</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-secondary"
            >
              <span class="material-symbols-outlined text-lg">lock</span>
            </div>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="ghost-border block w-full pl-11 pr-12 py-3.5 bg-surface text-on-surface rounded-lg focus:ring-0 focus:outline-none transition-all"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-secondary hover:text-primary transition-colors"
            >
              <span class="material-symbols-outlined text-lg">{{
                showPassword() ? 'visibility_off' : 'visibility'
              }}</span>
            </button>
          </div>
        </div>

        <!-- Error message -->
        @if (errorMessage()) {
          <div
            class="flex items-center gap-2 px-4 py-3 bg-error-container text-on-error-container rounded-lg text-sm"
          >
            <span class="material-symbols-outlined text-lg">error</span>
            {{ errorMessage() }}
          </div>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading() || form.invalid"
          class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          @if (loading()) {
            <span class="material-symbols-outlined text-xl animate-spin">progress_activity</span>
            <span>Connexion en cours...</span>
          } @else {
            <span>Se Connecter</span>
            <span class="material-symbols-outlined text-xl">login</span>
          }
        </button>
      </form>

      <!-- Security badge -->
      <div class="mt-10 flex items-center justify-center gap-4">
        <div class="h-px flex-1 bg-surface-container-highest"></div>
        <div
          class="flex items-center text-[0.65rem] text-outline font-bold uppercase tracking-widest"
        >
          <span
            class="material-symbols-outlined text-sm mr-1.5"
            style="font-variation-settings: 'FILL' 1"
            >verified_user</span
          >
          Accès Sécurisé
        </div>
        <div class="h-px flex-1 bg-surface-container-highest"></div>
      </div>
    </div>
  </div>
</main>
